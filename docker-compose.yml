services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: bantai
      POSTGRES_PASSWORD: bantai_dev
      POSTGRES_DB: bantai_db
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@bantai.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata:
